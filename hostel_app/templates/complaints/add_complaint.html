{% extends 'master.html' %}

{% block content %}

<div class="container mt-5">

    <h1 class="text-center mb-5">

        Raise Complaint

    </h1>

    <div class="row justify-content-center">

        <div class="col-md-6">

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">

                        Complaint Title

                    </label>

                    <input
                        type="text"
                        name="title"
                        class="form-control"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Description

                    </label>

                    <textarea
                        name="description"
                        class="form-control"
                        rows="5"
                        required
                    ></textarea>

                </div>

                <button
                    type="submit"
                    class="btn btn-danger"
                >

                    Submit Complaint

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
