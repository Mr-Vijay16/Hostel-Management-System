{% extends 'master.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4">

            Reset Password

        </h2>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="btn btn-primary"
            >

                Update Password

            </button>

        </form>

    </div>

</div>

{% endblock %}
