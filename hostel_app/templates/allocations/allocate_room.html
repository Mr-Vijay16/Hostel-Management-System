{% extends "master.html" %}

{% block title %}
Allocate Room
{% endblock title %}

{% block content %}

<div class="container mt-5">

    <h1 class="text-center mb-4">
        Allocate Room
    </h1>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button
            type="submit"
            class="btn btn-primary"
        >
            Allocate Room
        </button>

    </form>

</div>

{% endblock content %}
