{% extends "master.html" %}

{% block title %}
Update Allocation
{% endblock title %}

{% block content %}

<div class="container-fluid py-4">

    <!-- PAGE HEADER -->

    <div class="text-center mb-4">

        <h1 class="fw-bold display-5 mb-2">

            Update Allocation

        </h1>

        <p class="text-muted fs-5">

            Edit room allocation details

        </p>

    </div>

    <!-- FORM CARD -->

    <div class="card border-0 shadow-lg rounded-4 overflow-hidden mx-auto"
         style="max-width: 850px;">

        <!-- CARD HEADER -->

        <div class="bg-primary text-white p-4">

            <h3 class="fw-bold mb-1">

                Allocation Details

            </h3>

            <p class="mb-0 opacity-75">

                Update student room allocation

            </p>

        </div>

        <!-- CARD BODY -->

        <div class="card-body p-4">

            <form method="POST">

                {% csrf_token %}

                <div class="row g-4">

                    <!-- STUDENT -->

                    <div class="col-md-6">

                        <label class="form-label fw-semibold">

                            Student

                        </label>

                        <div class="input-group">

                            <span class="input-group-text">

                                <i class="bi bi-person"></i>

                            </span>

                            {{ form.student }}

                        </div>

                    </div>

                    <!-- ROOM -->

                    <div class="col-md-6">

                        <label class="form-label fw-semibold">

                            Room

                        </label>

                        <div class="input-group">

                            <span class="input-group-text">

                                <i class="bi bi-door-open"></i>

                            </span>

                            {{ form.room }}

                        </div>

                    </div>

                </div>

                <!-- BUTTONS -->

                <div class="d-flex justify-content-end gap-3 mt-4">

                    <a href="{% url 'allocation-list' %}"
                       class="btn btn-light border px-4 py-2 rounded-3 fw-semibold">

                        Cancel

                    </a>

                    <button type="submit"
                            class="btn btn-primary px-4 py-2 rounded-3 fw-semibold">

                        <i class="bi bi-check-circle me-1"></i>

                        Update Allocation

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<style>

    .form-select,
    .form-control {

        height: 50px;
        border-radius: 12px;
        font-size: 15px;

    }

    .input-group-text {

        border-radius: 12px 0 0 12px;
        background: #f8f9fa;
        padding: 0 16px;

    }

    .form-select:focus,
    .form-control:focus {

        border-color: #0d6efd;
        box-shadow: 0 0 0 0.15rem rgba(13,110,253,.15);

    }

</style>

{% endblock content %}
